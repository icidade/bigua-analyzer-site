<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; img-src data:; base-uri 'self'; form-action 'none'; frame-ancestors 'none'" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>404 — Page Not Found · bigua-analyzer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>" />
  <style>
    .not-found {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
      gap: 16px;
    }
    .not-found-code {
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 700;
      line-height: 1;
      color: var(--color-border);
      font-family: var(--font-mono);
    }
    .not-found h1 {
      font-size: 24px;
      font-weight: 600;
    }
    .not-found p {
      color: var(--color-muted);
      max-width: 420px;
    }
  </style>
</head>
<body>

  <header>
    <a class="header-brand" href="/">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
      bigua-analyzer
    </a>
  </header>

  <main>
    <div class="not-found">
      <p class="not-found-code" aria-hidden="true">404</p>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a class="btn btn-primary" href="/">Go back home</a>
    </div>
  </main>

  <footer>
    <span>Built with ❤️ by <a href="https://github.com/icidade" target="_blank" rel="noopener noreferrer">icidade</a></span>
    <span aria-hidden="true">·</span>
    <span><a href="https://github.com/icidade/bigua-analyzer" target="_blank" rel="noopener noreferrer">GitHub</a></span>
    <span aria-hidden="true">·</span>
    <span>MIT License</span>
  </footer>

</body>
</html>
