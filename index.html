<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data: https://github.com https://github-production-user-asset-6210df.s3.amazonaws.com; base-uri 'self'; form-action 'none'; frame-ancestors 'none'" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Biguá-Analyzer</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .logo-wrapper {
      animation: fadeIn 1.2s ease both;
    }

    .logo-img {
      max-width: min(560px, 85vw);
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .tagline {
      margin-top: 2.5rem;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #aaa;
      letter-spacing: 0.04em;
      animation: fadeIn 1.8s ease both;
    }

    .badge {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.55rem 1.4rem;
      border: 1px solid #2a6fc9;
      border-radius: 999px;
      color: #2a6fc9;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: fadeIn 2.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="logo-wrapper">
    <img
      class="logo-img"
      src="https://github.com/user-attachments/assets/81e676ff-7b8c-4c68-b47e-c4b7f60e75c6"
      alt="Biguá-Analyzer — logotipo com ave em voo e nome do projeto"
    />
    <p class="tagline">Análise inteligente de dados de cidades</p>
    <span class="badge">Em breve</span>
  </div>
</body>
</html>
